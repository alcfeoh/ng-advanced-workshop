<div class="dropdown">
  <input type="text" class="dropbtn" [formControl]="entryControl"
    [placeholder]="placeholder" >
  @if (filteredEntries$ | async; as entries) {
    <div class="dropdown-content">
      @for (entry of entries; track entry) {
        <span (click)="newSelection(entry)"
          [innerHTML]="entry.description | highlight: entryControl.value">
        </span>
      }
    </div>
  }
</div>
